name: Build and deploy site

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "config/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: |
          pip install \
            "mkdocs-material>=9.5" \
            "pymdown-extensions>=10.0"

      - name: Build site
        # Not using --strict: imported docs may contain links to source-repo
        # files we intentionally don't publish (operations runbooks, etc.).
        # Link rewrites in config/sources.yaml convert those to GitHub URLs.
        run: mkdocs build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Sync to S3
        run: |
          aws s3 sync site/ s3://${{ vars.AWS_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
