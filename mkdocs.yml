site_name: ISCO Documentation Hub
site_description: Central documentation for DCCA ISCO infrastructure, applications, and operations
site_author: DCCA ISCO

repo_url: https://github.com/DCCA-ISCO/isco-docs-hub
repo_name: DCCA-ISCO/isco-docs-hub
edit_uri: ""

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  # [IMPORTED_NAV_START]
  - WordPress (cca.hawaii.gov):
    - imported/wordpress-aws/index.md
    - Architecture: imported/wordpress-aws/architecture.md
    - Security Review: imported/wordpress-aws/security.md
  - CI/CD:
    - imported/cicd/index.md
    - Overview: imported/cicd/README.md
    - Responsibilities: imported/cicd/docs/00-RESPONSIBILITIES-BREAKDOWN.md
    - Pipeline Overview: imported/cicd/docs/01-OVERVIEW.md
    - AWS Infrastructure Setup: imported/cicd/docs/02-AWS-INFRASTRUCTURE-SETUP.md
    - GitHub Configuration: imported/cicd/docs/03-GITHUB-CONFIGURATION.md
    - Testing Standards: imported/cicd/docs/04-TESTING-STANDARDS.md
    - Security Standards: imported/cicd/docs/05-SECURITY-STANDARDS.md
    - SSM Deployment SOP: imported/cicd/docs/06-SSM-DEPLOYMENT-SOP.md
    - Troubleshooting: imported/cicd/docs/07-TROUBLESHOOTING.md
    - Workflow Customization: imported/cicd/docs/08-WORKFLOW-CUSTOMIZATION.md
  - Security:
    - imported/security/index.md
    - Knowledge Base: imported/security/knowledge-base.md
    - Setup Walkthrough: imported/security/setup-walkthrough.md
    - Remediation Process: imported/security/remediation-process.md
    - Vulnerability Management: imported/security/vulnerability-management-process.md
  - Scriptor:
    - imported/scriptor/index.md
    - Ideas: imported/scriptor/ideas.md
  # [IMPORTED_NAV_END]
  - Manual Docs:
    - manual/index.md
    - Converting to Markdown: manual/converting-to-markdown.md
