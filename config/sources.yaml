# Source allowlist — explicit list of files pulled from external repos.
#
# Each source declares:
#   name:   short identifier (used as folder name under docs/imported/)
#   repo:   <org>/<repo>
#   branch: branch to pull from (typically main)
#   files:  list of {src, dest} pairs
#
# Image and other binary files (.png/.jpg/.gif/.pdf/.svg) are copied as-is.
# Markdown files are passed through redactions defined in config/redactions.yaml.
#
# To add a source repository:
#   1. Append a new entry below.
#   2. Open a PR. CI will validate sources.yaml.
#   3. On merge, the next sync run pulls the new files into docs/imported/.
#
# The source repository does NOT need any setup. The hub pulls; sources don't push.

sources:
  - name: wordpress-aws
    repo: DCCA-ISCO/DCCA-WPSITE
    branch: main
    files:
      - src: docs/SOLUTIONS_ARCHITECT.md
        dest: wordpress-aws/architecture.md
      - src: docs/SECURITY_REVIEW.md
        dest: wordpress-aws/security.md
      - src: docs/images/WPSiteDiagram.png
        dest: wordpress-aws/images/WPSiteDiagram.png
    link_rewrites:
      # Internal renames: SECURITY_REVIEW.md → security.md (the published name)
      - description: Map SECURITY_REVIEW.md to its published filename
        pattern: '\]\(SECURITY_REVIEW\.md(#[^)]*)?\)'
        replace: '](security.md\1)'
      # Unpublished sibling docs: redirect to their GitHub source so the link works
      - description: Point unpublished sibling docs at GitHub source repo
        pattern: '\]\((OPERATIONS|PATCH_MANAGEMENT_STRATEGY|PATCH_REGISTER)\.md(#[^)]*)?\)'
        replace: '](https://github.com/DCCA-ISCO/DCCA-WPSITE/blob/main/docs/\1.md\2)'

  - name: cicd
    repo: DCCA-ISCO/.github
    branch: main
    files:
      - src: README.md
        dest: cicd/README.md
      - src: docs/00-RESPONSIBILITIES-BREAKDOWN.md
        dest: cicd/docs/00-RESPONSIBILITIES-BREAKDOWN.md
      - src: docs/01-OVERVIEW.md
        dest: cicd/docs/01-OVERVIEW.md
      - src: docs/02-AWS-INFRASTRUCTURE-SETUP.md
        dest: cicd/docs/02-AWS-INFRASTRUCTURE-SETUP.md
      - src: docs/03-GITHUB-CONFIGURATION.md
        dest: cicd/docs/03-GITHUB-CONFIGURATION.md
      - src: docs/04-TESTING-STANDARDS.md
        dest: cicd/docs/04-TESTING-STANDARDS.md
      - src: docs/05-SECURITY-STANDARDS.md
        dest: cicd/docs/05-SECURITY-STANDARDS.md
      - src: docs/06-SSM-DEPLOYMENT-SOP.md
        dest: cicd/docs/06-SSM-DEPLOYMENT-SOP.md
      - src: docs/07-TROUBLESHOOTING.md
        dest: cicd/docs/07-TROUBLESHOOTING.md
      - src: docs/08-WORKFLOW-CUSTOMIZATION.md
        dest: cicd/docs/08-WORKFLOW-CUSTOMIZATION.md
    link_rewrites:
      # workflow-templates/ and workflows/ aren't published as docs pages
      # (they're .yml files). Redirect README links to GitHub source.
      - description: Point workflow-templates/ links at GitHub source
        pattern: '\]\(workflow-templates/([^)]*)\)'
        replace: '](https://github.com/DCCA-ISCO/.github/tree/main/workflow-templates/\1)'
      - description: Point workflows/ links at GitHub source
        pattern: '\]\(workflows/([^)]+)\)'
        replace: '](https://github.com/DCCA-ISCO/.github/blob/main/workflows/\1)'

  - name: security
    repo: DCCA-ISCO/dcca-security
    branch: main
    files:
      - src: docs/SECURITY_KNOWLEDGE_BASE.md
        dest: security/knowledge-base.md
      - src: docs/SETUP_WALKTHROUGH.md
        dest: security/setup-walkthrough.md
      - src: docs/REMEDIATION_PROCESS.md
        dest: security/remediation-process.md
      - src: docs/VULNERABILITY_MANAGEMENT_PROCESS.md
        dest: security/vulnerability-management-process.md
    link_rewrites:
      - description: Rewrite docs/ markdown links to full GitHub URLs
        pattern: '\]\(docs/([^)]+)\)'
        replace: '](https://github.com/DCCA-ISCO/dcca-security/blob/main/docs/\1)'
      - description: Rewrite backtick-wrapped docs/ paths to linked code spans
        pattern: '`(docs/[A-Z_]+\.md)`'
        replace: '[`\1`](https://github.com/DCCA-ISCO/dcca-security/blob/main/docs/\1)'
      - description: Rewrite bare docs/ path references to GitHub links
        pattern: '(?<!\[)(?<!\()(?<!`)(?<!\/)(docs/[A-Z_]+\.md)(?!`)'
        replace: '[docs/\1](https://github.com/DCCA-ISCO/dcca-security/blob/main/docs/\1)'

  - name: scriptor
    repo: DCCA-ISCO/scriptor
    branch: main
    files:
      - src: docs/IDEAS.md
        dest: scriptor/ideas.md
    link_rewrites:
      - description: Rewrite docs/ markdown links to full GitHub URLs
        pattern: '\]\(docs/([^)]+)\)'
        replace: '](https://github.com/DCCA-ISCO/scriptor/docs/IDEAS.md)'
  
        
